name: 每日国际新闻采集

on:
  schedule:
    # 北京时间每天早上 8:00 (UTC 0:00)
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取新闻
        run: python fetch_news.py

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "📰 更新 $(date +'%Y-%m-%d') 每日新闻"
          git push
